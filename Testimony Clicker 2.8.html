                        }

                        }

                        }

                //# sourceMappingURL=swarm-numberformat.min.js.map
                
                // P Studies
                var studyRequirement = 1000;
                function pstudy () {
                        if (VARtotalBomClicks >= studyRequirement) {
                                VARtestimoniesPerClick ++;
                                testimonyCount = testimonyCount + (VARtestimoniesPerSecond * 600);
                                VARtotalBomClicks -= 1000;
                                document.getElementById("IDtotalBomClicks").innerHTML = numberformat.format (VARtotalBomClicks);
                                document.getElementById("perClick").innerHTML = numberformat.format (VARtestimoniesPerClick);
                        }
                }
                
                //game function variables ----------
                let testimonyCount = 0;
                let VARtestimoniesPerClick = 1;
                let VARtestimoniesPerSecond = 0;
                let VARtotalBomClicks = 0;
                let VARtotalTestimonies = 0;
                let VARhandmadeTestimonies = 0;

                //testimony production output functions
                function bomClicked () {
                        testimonyCount = testimonyCount+VARtestimoniesPerClick;
                        VARtotalBomClicks += 1;
                        VARtotalTestimonies += VARtestimoniesPerClick;
                        VARhandmadeTestimonies = VARhandmadeTestimonies + VARtestimoniesPerClick;
                        document.getElementById("IDtestimonyCounter").innerHTML = numberformat.format (testimonyCount);
                        document.getElementById("IDhandmadeTestimonies").innerHTML = numberformat.format (VARhandmadeTestimonies);
                }
                
                //game running functions
                function update() {
                        updateCPS();
                        //console.log(VARtestimoniesPerSecond);
                        updateButtons();
                        documentEverything();
                        document.title = numberformat.format (testimonyCount) + " Testimonies - Testimony Clicker";
                }
                function CPS() {
                        testimonyCount = ((testimonyCount * 10) + (VARtestimoniesPerSecond * 10))/10;
                        VARtotalTestimonies = ((VARtotalTestimonies*10) + (VARtestimoniesPerSecond*10))/10;
                }
                function updateCPS() { 
                        VARtestimoniesPerSecond = 0;
                        buildingsArray.forEach(building => { 
                                VARtestimoniesPerSecond += ((building.tps * 10) * (building.numberOfBuildings * 10))/100;
                                //console.log(`${building.name}` + building.numberOfBuildings);
                        });
                        if (VARtestimoniesPerSecond < 1000) {
                                document.getElementById("IDdisplayTPS").innerHTML = VARtestimoniesPerSecond;
                        } else {
                                document.getElementById("IDdisplayTPS").innerHTML = numberformat.format (VARtestimoniesPerSecond);
                        }
                }
                function saveGame () {
                        var gameSave = {
                                buildings: buildingsArray.map(building => ({ 
                                        id: building.id,
                                        numberOfBuildings: building.numberOfBuildings,
                                        cost: building.cost,
                                })),
                                testimonyCount: testimonyCount,
                                VARtestimoniesPerClick: VARtestimoniesPerClick,
                                VARtestimoniesPerSecond: VARtestimoniesPerSecond,
                                VARtotalBomClicks: VARtotalBomClicks,
                                VARtotalTestimonies: VARtotalTestimonies,
                                studyRequirement: studyRequirement,
                                VARhandmadeTestimonies: VARhandmadeTestimonies
                        };
                        localStorage.setItem("gameSave", JSON.stringify(gameSave));
                }
                function resetGame() {
                        if (confirm("Press OK to reset your game. You're an idiot if you do this, but you have your agency. Please ensure that you don't have this game running in any other tabs, or the reset may fail.")) {
                                var gameSave = {};
                                localStorage.removeItem('gameSave');
                                location.reload();
                        }
                }
                function loadGame() {
                        const savedGame = JSON.parse(localStorage.getItem("gameSave"));
                                if (typeof savedGame.testimonyCount !== "undefined") testimonyCount = savedGame.testimonyCount;
                                if (typeof savedGame.VARtestimoniesPerClick !== "undefined") VARtestimoniesPerClick = savedGame.VARtestimoniesPerClick;
                                //MIGHT NOT NEED THIS IF TPS FUNCTION WORKS BETTER //if (typeof savedGame.VARtestimoniesPerSecond !== "undefined") VARtestimoniesPerSecond = savedGame.VARtestimoniesPerSecond;
                                if (typeof savedGame.VARtotalBomClicks !== "undefined") VARtotalBomClicks = savedGame.VARtotalBomClicks;
                                if (typeof savedGame.VARtotalTestimonies !== "undefined") VARtotalTestimonies = savedGame.VARtotalTestimonies;
                                if (typeof savedGame.studyRequirement !== "undefined") studyRequirement = savedGame.studyRequirement;
                                if (typeof savedGame.VARhandmadeTestimonies !== "undefined") VARhandmadeTestimonies = savedGame.VARhandmadeTestimonies;

                                savedGame.buildings.forEach(savedBuilding => {
                                        const building = buildingsArray.find(b => b.id === savedBuilding.id);
                                        if (building) {
                                                building.numberOfBuildings = savedBuilding.numberOfBuildings;
                                                building.cost = savedBuilding.cost;
                                                console.log(savedBuilding);
                                                documentEverything();
                                        }
                                })

                        documentEverything();
                }
                function documentEverything () {
                        document.getElementById("IDtestimonyCounter").innerHTML = numberformat.format (testimonyCount);
                        document.getElementById("IDtestimoniesPerClick").innerHTML = VARtestimoniesPerClick;
                        document.getElementById("IDtotalBomClicks").innerHTML = numberformat.format (VARtotalBomClicks);
                        document.getElementById("IDtotalTestimonies").innerHTML = numberformat.format (VARtotalTestimonies);
                        document.getElementById("IDstudyRequirement").innerHTML = numberformat.format (studyRequirement);
                        if (VARtestimoniesPerSecond < 1000) {
                        document.getElementById("IDdisplayTPS").innerHTML = VARtestimoniesPerSecond;
                        } else {
                        document.getElementById("IDdisplayTPS").innerHTML = numberformat.format (VARtestimoniesPerSecond);
                        }
                        document.getElementById("IDhandmadeTestimonies").innerHTML = numberformat.format (VARhandmadeTestimonies);
                        buildingsArray.forEach(building => {
                                document.getElementById(building.IDnumberOfBuildings).innerHTML = building.numberOfBuildings;
                                document.getElementById(building.name).innerHTML = numberformat.format(building.cost);
                                document.getElementById(building.IDinfoNumberOfBuildings).innerHTML = building.numberOfBuildings;
                                document.getElementById(building.IDtotalTps).innerHTML = (building.numberOfBuildings * (building.tps * 10)/10);
                                document.getElementById(building.IDtps).innerHTML = numberformat.format(building.tps);
                                //console.log("Should have updated number of buildings");
                        })
                        document.getElementById("ID1minuteTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 60));
                        document.getElementById("ID5minuteTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 300));
                        document.getElementById("ID10minuteTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 600));
                        document.getElementById("ID15minuteTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 900));
                        document.getElementById("ID30minuteTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 1800));
                        document.getElementById("ID1hourTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 3600));
                        document.getElementById("ID6hourTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 21600));
                        document.getElementById("ID24hourTestimonies").innerHTML = numberformat.format (testimonyCount + (VARtestimoniesPerSecond * 86400));
                        console.log("Documented Everything")
                }

                function updateButtons() {
                        buildingsArray.forEach(building => {
                                if (building.cost > testimonyCount) {
                                        document.getElementById(building.id).classList.add('CLASSdisable');
                                        //console.log("You cannot afford " + building.name);
                                } else {
                                        document.getElementById(building.id).classList.remove('CLASSdisable');
                                }
                        })
                }

                window.onload = function () {
                        loadGame();
                }

                setInterval(update, 50);
                setInterval(CPS, 1000);
                setInterval(saveGame, 60000);
                
                </script>
                
        </body>
        </main>
