<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        
    </header>
    <main>
        <div id="IDcharacterCard" class="card">
            <img src="thing.png" width="100%" style="border-radius: 15px;">
            <h1 class="name" id="IDname">Name</h1>
            <div class="stats">
                <p><span class="bold">Class:</span> <span id = "IDclass">Class</span></p>
                <p><span class="bold">Level:</span> <span id = "IDlevel">Level</span></p>
                <p><span class="bold">Health:</span> <span id = "IDhealth">Health</span></p>
            </div>
            <div class="buttons">
                <button id="IDattacked">Attacked</button>
                <button id="IDlevelUp">Level Up</button>
            </div>
        </div>
    </main>
    <footer>
        <!-- Open Graph (Facebook, LinkedIn, etc.) -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Put Page Title Here">
        <meta property="og:description" content="Put Page Description Here">
        <meta property="og:url" content="https://yourURLofPage.here">
        <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Put Page Title Here">
        <meta name="twitter:description" content="Put Page Description Here">
        <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

        <!-- One favicon (ICO works everywhere) -->
        <link rel="icon" href="/favicon.ico">

        <!-- One Apple Touch Icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
        

    </footer>
</body>
</html>
