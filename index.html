<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jacob Bree's portfolio of art and web development projects">
    <title>Jacob Bree</title>
    <style>
        body {
            background-color: #493843;
        }
        header { 
            background-color: #B8C5D6;
            height: 20rem;
        }
        .logoImg {
            width: 300px;
            height: 300px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href='https://fonts.googleapis.com/css?family=Aldrich&font-display=swap' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Annie Use Your Telescope&font-display=swap' rel='stylesheet'>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
</head>
<body>
    <header>
        <img src="images/sadness-no-name-logo-sad-version.png" class="logoImg" alt="Jacob Bree Logo" width="300" height="300" fetchpriority="high">
        <div class="header-info">
            <h1>Jacob Bree</h1>
            <h3>Hi! I like to dabble in art and web development. This website acts as a gallery of projects that I am most proud of, feel free to look around!</h3>
        </div>
    </header>
    <main>
        <div class="artColumn">
            <h1 class="columnHeading">Art</h1>
        </div>
        <div class="projectColumn">
            <h1 class="columnHeading">Web Development</h1>
        </div>
    </main>
    <dialog>
        <img>
        <button class="close-viewer" aria-label="Close image viewer">X</button>
    </dialog>
    <footer>
        Jacob Bree 2026
    </footer>
</body>
</html>
